name: Scheduled Audit
on:
  schedule:
    - cron: '0 6 * * 0'
  workflow_dispatch:
    inputs:
      username:
        description: 'GitHub username to audit'
        required: true
        default: 'saagpatel'

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .
      - name: Run audit
        env:
          GITHUB_TOKEN: ${{ secrets.AUDIT_GITHUB_TOKEN }}
        run: |
          python -m src ${{ github.event.inputs.username || 'saagpatel' }} \
            --incremental --html --badges --diff
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: audit-report-${{ github.run_number }}
          path: output/
          retention-days: 90
      - name: Commit results
        if: github.event_name == 'schedule'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add output/
          git diff --staged --quiet || git commit -m "chore: scheduled audit $(date +%Y-%m-%d)"
          git push
